name: Dependabot Auto-Merge

# NOTE: Using pull_request_target instead of pull_request is intentional.
# This allows the workflow to run with the repository's full permissions,
# which is necessary for auto-merge operations. Because pull_request_target fires
# for ANY PR, every job below is gated with:
#   if: github.event.pull_request.user.login == 'dependabot[bot]'
# so non-dependabot PRs skip the whole workflow (no approval, no merge).
# See: https://github.blog/changelog/2021-02-19-github-actions-workflows-triggered-by-dependabot-prs-run-with-read-only-permissions/

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

# Prevent concurrent runs for the same PR number to avoid race conditions
concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Job 1: Auto-Approve the Dependabot PR
  auto-approve:
    name: Auto-Approve Dependabot PR
    # Dependabot-only gate (see workflow header). This also replaces the old
    # in-step author check, which exited 0 for non-dependabot PRs and let the
    # downstream wait-for-tests/auto-merge jobs run anyway.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    env:
      # gh CLI resolves the repo for `gh pr <subcommand> <number>` via either
      # a git remote, the --repo flag, or GH_REPO. This job has no checkout
      # step (none is needed to approve), so without GH_REPO gh fails with
      # "fatal: not a git repository". See wait-for-tests/auto-merge jobs too.
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Approve PR with GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Approving PR #$PR_NUMBER..."
          gh pr review "$PR_NUMBER" --approve \
            --body "Auto-approved by dependabot-auto-merge workflow"
        shell: bash

      - name: Add approval summary
        run: echo "✅ PR Auto-Approved" >> $GITHUB_STEP_SUMMARY

  # Job 2: Wait for CI checks to pass
  wait-for-tests:
    name: Wait for CI Tests
    needs: auto-approve
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      checks: read
      actions: read
    timeout-minutes: 30

    steps:
      - name: Get commit SHA
        id: get-sha
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          echo "commit_sha=$SHA" >> $GITHUB_OUTPUT
          echo "Waiting for checks on commit: $SHA"
        shell: bash

      - name: Wait for required workflows to complete
        id: wait-workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ steps.get-sha.outputs.commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          # Workflows that must ALL complete successfully before auto-merging:
          # - "Build and Publish"  : build.yml — build, 6 integration tests, Trivy scan
          # - "Claude Code Review" : claude-code-review.yml — AI review (gates merge)
          REQUIRED_WORKFLOWS=("Build and Publish" "Claude Code Review")

          MAX_ATTEMPTS=60   # 30 minutes at 30-second intervals
          INTERVAL=30
          ATTEMPT=0
          ALL_DONE=false
          ALL_PASSED=false

          echo "Waiting for required workflows on commit $COMMIT_SHA:"
          printf '  - %s\n' "${REQUIRED_WORKFLOWS[@]}"

          while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
            ATTEMPT=$((ATTEMPT + 1))

            # Fetch all workflow runs for this commit in one call.
            # IMPORTANT: --method GET is required. Passing -f fields without
            # --method makes gh api default to POST, and POST /actions/runs
            # does not exist (HTTP 404) — which is why this step used to spin
            # on "API call failed" forever. head_sha goes in the query string
            # to avoid -f entirely.
            ERRFILE=$(mktemp)
            if ! RAW=$(gh api --method GET \
                -H "Accept: application/vnd.github.v3+json" \
                "repos/$REPO/actions/runs?head_sha=$COMMIT_SHA&per_page=100" 2>"$ERRFILE"); then
              # Print the real error (includes the HTTP status, e.g.
              # "gh: Not Found (HTTP 404)") instead of a bare "API call failed".
              echo "✗ gh api failed on attempt $ATTEMPT/$MAX_ATTEMPTS:"
              sed 's/^/    /' "$ERRFILE"
              rm -f "$ERRFILE"
              sleep "$INTERVAL"
              continue
            fi
            rm -f "$ERRFILE"

            ALL_DONE=true
            ALL_PASSED=true
            for WF in "${REQUIRED_WORKFLOWS[@]}"; do
              # Latest run for this workflow name (runs are returned newest-first).
              RUN_INFO=$(printf '%s' "$RAW" | jq -r \
                --arg name "$WF" \
                '[.workflow_runs[] | select(.name == $name)] | .[0] // {}')

              STATUS=$(printf '%s' "$RUN_INFO" | jq -r '.status // "missing"')
              CONCLUSION=$(printf '%s' "$RUN_INFO" | jq -r '.conclusion // "none"')

              echo "  [$WF] status=$STATUS conclusion=$CONCLUSION"

              if [[ "$STATUS" == "missing" ]]; then
                ALL_DONE=false      # workflow hasn't started yet
              elif [[ "$STATUS" != "completed" ]]; then
                ALL_DONE=false      # still running
              elif [[ "$CONCLUSION" != "success" ]]; then
                ALL_PASSED=false    # completed but failed
              fi
            done

            if [[ "$ALL_DONE" == true ]]; then
              break
            fi

            REMAINING_MINUTES=$(( (MAX_ATTEMPTS - ATTEMPT) * INTERVAL / 60 ))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS (~${REMAINING_MINUTES}m remaining)... waiting ${INTERVAL}s"
            sleep "$INTERVAL"
          done

          if [[ "$ALL_DONE" != true ]]; then
            echo "✗ Required workflows did not complete within $(( MAX_ATTEMPTS * INTERVAL / 60 )) minutes"
            echo "workflow_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          if [[ "$ALL_PASSED" == true ]]; then
            echo "✓ All required workflows completed successfully"
            echo "workflow_passed=true" >> $GITHUB_OUTPUT
          else
            echo "✗ One or more required workflows completed with a non-success conclusion"
            echo "workflow_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        shell: bash

      - name: Check status checks and check runs
        id: check-status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ steps.get-sha.outputs.commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Checking status checks and check runs for commit: $COMMIT_SHA"

          # Check GitHub Actions check runs (this is what Actions create)
          CHECK_RUNS_FAILED=$(gh api \
            "repos/$REPO/commits/$COMMIT_SHA/check-runs" \
            --jq '[.check_runs[] | select(.conclusion == "failure" or .conclusion == "cancelled")] | length' 2>/dev/null || echo "0")

          CHECK_RUNS_TOTAL=$(gh api \
            "repos/$REPO/commits/$COMMIT_SHA/check-runs" \
            --jq '.check_runs | length' 2>/dev/null || echo "0")

          echo "Check runs: $CHECK_RUNS_TOTAL total, $CHECK_RUNS_FAILED failed/cancelled"

          # Log which specific check runs failed for debugging
          if [[ $CHECK_RUNS_FAILED -gt 0 ]]; then
            echo ""
            echo "Failed check runs:"
            gh api "repos/$REPO/commits/$COMMIT_SHA/check-runs" \
              --jq '.check_runs[] | select(.conclusion == "failure" or .conclusion == "cancelled") | "  - \(.name): \(.conclusion)"' \
              2>/dev/null || echo "  (Unable to fetch details)"
            echo ""
          fi

          # Also check combined status (for any traditional commit statuses)
          COMBINED_STATUS=$(gh api \
            "repos/$REPO/commits/$COMMIT_SHA/status" \
            --jq '.state' 2>/dev/null || echo "unknown")

          echo "Combined status: $COMBINED_STATUS"

          # Pass only if no check runs failed AND combined status is success or pending
          if [[ $CHECK_RUNS_FAILED -eq 0 ]] && [[ "$COMBINED_STATUS" != "failure" ]]; then
            echo "✓ All status checks and check runs passed"
            echo "checks_passed=true" >> $GITHUB_OUTPUT
          else
            echo "✗ Some checks failed (check runs failed: $CHECK_RUNS_FAILED, combined status: $COMBINED_STATUS)"
            echo "checks_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        shell: bash

      - name: Add test summary
        if: steps.check-status.outputs.checks_passed == 'true'
        run: echo "✅ All CI Tests Passed" >> $GITHUB_STEP_SUMMARY

      - name: Report test failure
        if: failure()
        run: echo "❌ CI Tests Failed or Timeout" >> $GITHUB_STEP_SUMMARY

  # Job 3: Auto-merge the PR
  auto-merge:
    name: Auto-Merge PR
    needs: wait-for-tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    # Dependabot-only (see auto-approve). success() preserves the default
    # "only run if wait-for-tests succeeded" behavior.
    if: github.event.pull_request.user.login == 'dependabot[bot]' && success()
    env:
      # Same as auto-approve: gh pr view/merge/comment need a repo context and
      # there is no checkout step in this job.
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Check PR is still open
        id: check-pr-status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
          echo "PR state: $PR_STATE"

          if [[ "$PR_STATE" == "OPEN" ]]; then
            echo "✓ PR is still open"
            echo "is_open=true" >> $GITHUB_OUTPUT
          else
            echo "✗ PR is already closed (state: $PR_STATE)"
            echo "is_open=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Enable auto-merge
        if: steps.check-pr-status.outputs.is_open == 'true'
        id: enable-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Enabling auto-merge for PR #$PR_NUMBER with merge strategy (creates merge commit)..."

          # Enable auto-merge with merge commit strategy
          if ! OUTPUT=$(gh pr merge "$PR_NUMBER" --auto --merge 2>&1); then
            EXIT_CODE=$?
            echo "Auto-merge command returned exit code: $EXIT_CODE"

            # Check if this is an expected error (auto-merge already enabled)
            if echo "$OUTPUT" | grep -qiE "(auto-merge|already).*enabled"; then
              echo "⚠ Auto-merge already enabled, continuing"
              exit 0
            # Check if repository doesn't have auto-merge enabled
            elif echo "$OUTPUT" | grep -qiE "auto.?merge.*not.*enabled|feature.*not.*enabled"; then
              echo "❌ Repository doesn't have auto-merge enabled!"
              echo "Please enable auto-merge in repository settings:"
              echo "  Settings → General → Pull Requests → Allow auto-merge"
              exit 1
            # Check for merge conflicts
            elif echo "$OUTPUT" | grep -qiE "conflict|mergeable"; then
              echo "❌ Merge conflict detected: $OUTPUT"
              exit 1
            # Check for branch protection violations
            elif echo "$OUTPUT" | grep -qiE "protection|required|review"; then
              echo "❌ Branch protection requirements not met: $OUTPUT"
              exit 1
            else
              echo "❌ Failed to enable auto-merge: $OUTPUT"
              exit 1
            fi
          fi

          echo "✓ Auto-merge enabled successfully"
          echo "merge_enabled=true" >> $GITHUB_OUTPUT
        shell: bash

      - name: Add merge comment
        if: steps.check-pr-status.outputs.is_open == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "✅ Auto-merging after successful CI tests. All required checks have passed."
        shell: bash

      - name: Add merge summary
        if: steps.check-pr-status.outputs.is_open == 'true'
        run: echo "✅ Auto-Merge Enabled" >> $GITHUB_STEP_SUMMARY

      - name: Report merge skipped
        if: steps.check-pr-status.outputs.is_open == 'false'
        run: echo "⚠ PR already closed, merge skipped" >> $GITHUB_STEP_SUMMARY

      - name: Add final summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ## Dependabot Auto-Merge Workflow Complete

          - ✅ Dependabot PR auto-approved
          - ✅ CI tests verified to pass
          - ✅ Auto-merge enabled

          The PR will automatically merge once all branch protection rules are satisfied.
          EOF
